<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8"><meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ðŸ† Duelo BÃ­blico â€” Sigo com FÃ©</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #1a0a3e 0%, #2b1a6e 50%, #1a0a3e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            color: #fff;
        }

        .card {
            background: rgba(255,255,255,0.07);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.15);
            max-width: 520px;
            width: 100%;
            padding: 32px 28px;
            border-radius: 20px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.4);
        }

        h1 {
            font-size: 26px;
            text-align: center;
            color: #f6d860;
            margin-bottom: 6px;
            text-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        .subtitulo {
            text-align: center;
            color: rgba(255,255,255,0.6);
            font-size: 13px;
            margin-bottom: 24px;
        }

        /* Seletor de idioma */
        .idiomas {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .idioma-btn {
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.3);
            background: transparent;
            color: rgba(255,255,255,0.7);
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }

        .idioma-btn:hover { border-color: #f6d860; color: #f6d860; }
        .idioma-btn.ativo {
            background: #f6d860;
            color: #1a0a3e;
            font-weight: bold;
            border-color: #f6d860;
        }

        /* Input nome */
        input[type="text"] {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 10px;
            background: rgba(255,255,255,0.1);
            color: #fff;
            font-size: 15px;
            margin-bottom: 14px;
            outline: none;
            transition: border 0.2s;
        }

        input[type="text"]:focus { border-color: #f6d860; }
        input[type="text"]::placeholder { color: rgba(255,255,255,0.4); }

        /* BotÃµes principais */
        .btn {
            width: 100%;
            padding: 15px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            background: linear-gradient(135deg, #f6d860, #e5b800);
            color: #1a0a3e;
            border: none;
            border-radius: 10px;
            transition: transform 0.15s, box-shadow 0.15s;
            box-shadow: 0 4px 15px rgba(246,216,96,0.3);
        }

        .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(246,216,96,0.4); }
        .btn:active { transform: translateY(0); }

        /* Status */
        #status {
            text-align: center;
            margin-top: 16px;
            color: rgba(255,255,255,0.7);
            font-size: 14px;
            min-height: 20px;
        }

        /* Timer */
        #timer {
            font-size: 48px;
            font-weight: bold;
            text-align: center;
            margin: 10px 0;
            transition: color 0.3s;
        }

        .timer-urgente { color: #ff4444 !important; animation: pulsar 0.5s infinite alternate; }
        .timer-normal { color: #f6d860; }

        @keyframes pulsar {
            from { transform: scale(1); }
            to { transform: scale(1.1); }
        }

        /* Info do jogo */
        .info-jogo {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding: 10px 14px;
            background: rgba(255,255,255,0.08);
            border-radius: 10px;
            font-size: 13px;
            color: rgba(255,255,255,0.7);
        }

        .pontos-badge {
            background: #f6d860;
            color: #1a0a3e;
            padding: 3px 10px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 13px;
        }

        /* Barra de progresso */
        .progresso-barra {
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .progresso-fill {
            height: 100%;
            background: #f6d860;
            border-radius: 4px;
            transition: width 0.5s ease;
        }

        /* Pergunta */
        #perguntaTexto {
            font-size: 18px;
            font-weight: 600;
            text-align: center;
            margin-bottom: 20px;
            line-height: 1.5;
            color: #fff;
            min-height: 60px;
        }

        /* Alternativas */
        .alt-btn {
            display: block;
            width: 100%;
            margin: 10px 0;
            padding: 14px 18px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 10px;
            cursor: pointer;
            font-size: 15px;
            color: #fff;
            text-align: left;
            transition: all 0.2s;
        }

        .alt-btn:hover:not([disabled]) {
            background: rgba(246,216,96,0.15);
            border-color: #f6d860;
            transform: translateX(4px);
        }

        .alt-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .alt-btn.correta { background: rgba(72,199,142,0.3) !important; border-color: #48c78e !important; }
        .alt-btn.errada  { background: rgba(255,68,68,0.3)  !important; border-color: #ff4444 !important; }

        /* NotificaÃ§Ã£o oponente respondeu */
        .notif-oponente {
            text-align: center;
            font-size: 12px;
            color: #f6d860;
            margin-top: 8px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        /* Resultado */
        #resultado { display: none; }

        .placar-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 18px;
            margin: 10px 0;
            border-radius: 10px;
            background: rgba(255,255,255,0.08);
        }

        .placar-item.vencedor {
            background: rgba(246,216,96,0.2);
            border: 1px solid #f6d860;
        }

        .emoji-resultado { font-size: 28px; }

        /* Screens */
        #jogo { display: none; }
        #resultado { display: none; }
    </style>
</head>
<body>

<div class="card">
    <h1>ðŸ† Duelo BÃ­blico</h1>
    <p class="subtitulo">Sigo com FÃ© â€” 7 Idiomas</p>

    <!-- ===== TELA DE ENTRADA ===== -->
    <div id="lobby">
        <p style="color:rgba(255,255,255,0.6); font-size:13px; text-align:center; margin-bottom:14px;">
            Escolhe o teu idioma:
        </p>

        <div class="idiomas">
            <button class="idioma-btn ativo" onclick="selecionarIdioma('pt', this)">ðŸ‡§ðŸ‡· PT</button>
            <button class="idioma-btn" onclick="selecionarIdioma('en', this)">ðŸ‡ºðŸ‡¸ EN</button>
            <button class="idioma-btn" onclick="selecionarIdioma('es', this)">ðŸ‡ªðŸ‡¸ ES</button>
            <button class="idioma-btn" onclick="selecionarIdioma('fr', this)">ðŸ‡«ðŸ‡· FR</button>
            <button class="idioma-btn" onclick="selecionarIdioma('de', this)">ðŸ‡©ðŸ‡ª DE</button>
            <button class="idioma-btn" onclick="selecionarIdioma('it', this)">ðŸ‡®ðŸ‡¹ IT</button>
            <button class="idioma-btn" onclick="selecionarIdioma('ro', this)">ðŸ‡·ðŸ‡´ RO</button>
        </div>

        <input type="text" id="nomeUsuario" placeholder="O teu nome ou apelido..." maxlength="20">
        <button class="btn" onclick="conectarAoJogo()">âš”ï¸ Procurar Oponente</button>
        <p id="status"></p>
    </div>

    <!-- ===== TELA DO JOGO ===== -->
    <div id="jogo">
        <div class="info-jogo">
            <span id="infoOponente">ðŸ‘¤ â€”</span>
            <span class="pontos-badge" id="meusPontos">0 pts</span>
        </div>

        <div class="progresso-barra">
            <div class="progresso-fill" id="progressoFill" style="width:10%"></div>
        </div>

        <div id="timer" class="timer-normal">15</div>

        <h2 id="perguntaTexto"></h2>
        <div id="alternativas"></div>
        <p class="notif-oponente" id="notifOponente">âœ”ï¸ Oponente jÃ¡ respondeu!</p>
    </div>

    <!-- ===== TELA DE RESULTADO ===== -->
    <div id="resultado">
        <h2 style="text-align:center; font-size:22px; margin-bottom:20px; color:#f6d860;">
            ðŸŽ‰ Fim do Duelo!
        </h2>
        <div id="placarFinal"></div>
        <button class="btn" style="margin-top:20px;" onclick="window.location.reload()">
            ðŸ”„ Jogar Novamente
        </button>
    </div>

</div>

<script>
// ============================================================
// âš ï¸ SUBSTITUI ESTA URL PELA URL DO TEU SERVIDOR NO RENDER!
// Exemplo: https://sigo-com-fe-backend.onrender.com
// ============================================================
const BACKEND_URL = "https://sigo-com-fe-api.onrender.com";

let socket;
let salaAtual = "";
let idiomaAtual = "pt";
let meuspontos = 0;
let perguntaAtualNum = 0;
const TOTAL_PERGUNTAS = 10;

// Textos por idioma para a UI
const UI_TEXTOS = {
    pt: { procurando: "â³ Aguardando um irmÃ£o para o duelo...", oponente: "Oponente" },
    en: { procurando: "â³ Waiting for an opponent...", oponente: "Opponent" },
    es: { procurando: "â³ Esperando un oponente...", oponente: "Oponente" },
    fr: { procurando: "â³ En attente d'un adversaire...", oponente: "Adversaire" },
    de: { procurando: "â³ Warte auf einen Gegner...", oponente: "Gegner" },
    it: { procurando: "â³ Aspettando un avversario...", oponente: "Avversario" },
    ro: { procurando: "â³ AÈ™teptÃ¢nd un adversar...", oponente: "Adversar" }
};

// Ping para acordar o Render antes do utilizador jogar
function acordarServidor() {
    fetch(BACKEND_URL + "/ping").catch(() => {});
}
acordarServidor();

function selecionarIdioma(idioma, btn) {
    idiomaAtual = idioma;
    document.querySelectorAll(".idioma-btn").forEach(b => b.classList.remove("ativo"));
    btn.classList.add("ativo");
}

function conectarAoJogo() {
    const nome = document.getElementById("nomeUsuario").value.trim();
    if (!nome) { alert("Por favor, escreve o teu nome!"); return; }

    document.getElementById("status").innerText = "ðŸ”Œ A conectar ao servidor...";
    socket = io(BACKEND_URL);

    socket.on("connect", () => {
        socket.emit("procurarPartida", { nome, idioma: idiomaAtual });
    });

    socket.on("status", (msg) => {
        document.getElementById("status").innerText = UI_TEXTOS[idiomaAtual]?.procurando || msg;
    });

    socket.on("inicioJogo", (dados) => {
        salaAtual = dados.salaId;
        meuspontos = 0;
        perguntaAtualNum = 0;

        document.getElementById("lobby").style.display = "none";
        document.getElementById("jogo").style.display = "block";

        const txtOponente = UI_TEXTOS[idiomaAtual]?.oponente || "Oponente";
        document.getElementById("infoOponente").innerText = `âš”ï¸ ${txtOponente}: ${dados.oponente}`;

        renderizarRodada(dados.pergunta);
    });

    socket.on("atualizarTimer", (tempo) => {
        const el = document.getElementById("timer");
        el.innerText = tempo;
        el.className = tempo <= 5 ? "timer-urgente" : "timer-normal";
    });

    socket.on("oponenteRespondeu", () => {
        const notif = document.getElementById("notifOponente");
        notif.style.opacity = "1";
    });

    socket.on("novaPergunta", (dados) => {
        perguntaAtualNum++;
        document.getElementById("notifOponente").style.opacity = "0";
        document.getElementById("timer").className = "timer-normal";
        renderizarRodada(dados.pergunta);
    });

    socket.on("fimJogo", (jogadores) => {
        document.getElementById("jogo").style.display = "none";
        document.getElementById("resultado").style.display = "block";

        const placar = document.getElementById("placarFinal");
        placar.innerHTML = "";

        jogadores.sort((a, b) => b.pontos - a.pontos);

        const emojis = ["ðŸ¥‡", "ðŸ¥ˆ"];
        jogadores.forEach((j, i) => {
            const div = document.createElement("div");
            div.className = `placar-item${i === 0 ? " vencedor" : ""}`;
            div.innerHTML = `
                <span>${emojis[i]} <b>${j.nome}</b></span>
                <span style="font-size:18px; font-weight:bold; color:#f6d860">${Math.round(j.pontos)} pts</span>
            `;
            placar.appendChild(div);
        });
    });

    socket.on("oponenteSaiu", () => {
        alert("O oponente saiu do jogo. ðŸ˜¢");
        window.location.reload();
    });

    socket.on("disconnect", () => {
        console.log("Desconectado do servidor.");
    });
}

function renderizarRodada(pergunta) {
    // Atualizar progresso
    const progresso = ((perguntaAtualNum) / TOTAL_PERGUNTAS) * 100;
    document.getElementById("progressoFill").style.width = `${progresso}%`;

    document.getElementById("perguntaTexto").innerText = pergunta.q;
    document.getElementById("meusPontos").innerText = `${Math.round(meuspontos)} pts`;

    const container = document.getElementById("alternativas");
    container.innerHTML = "";

    pergunta.a.forEach((alt, idx) => {
        const btn = document.createElement("button");
        btn.className = "alt-btn";
        btn.innerText = `${String.fromCharCode(65+idx)}) ${alt}`;

        btn.onclick = () => {
            bloquearAlternativas();
            // Visual de resposta
            if (idx === pergunta.c) {
                btn.classList.add("correta");
                meuspontos += 100;
                document.getElementById("meusPontos").innerText = `${Math.round(meuspontos)} pts`;
            } else {
                btn.classList.add("errada");
                // Mostrar a correta
                const botoes = document.querySelectorAll(".alt-btn");
                botoes[pergunta.c].classList.add("correta");
            }
            socket.emit("enviarResposta", { salaId: salaAtual, escolha: idx });
        };
        container.appendChild(btn);
    });
}

function bloquearAlternativas() {
    document.querySelectorAll(".alt-btn").forEach(b => b.disabled = true);
}
</script>

</body>
</html>
